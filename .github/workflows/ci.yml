name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  agent-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lingji-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: lingji-agent/pyproject.toml
      - name: Install Agent
        run: pip install -e .
      - name: Pytest with coverage
        run: |
          python -m pytest tests/ -q \
            --cov=src/lingji_agent \
            --cov-report=term-missing \
            --cov-fail-under=55

  gateway-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lingji-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: lingji-gateway/go.sum
      - name: Go test
        run: go test ./...
